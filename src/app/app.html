<!-- If administrative layout should be shown -->
@if (showAdminLayout()) {
  <div class="flex flex-col md:flex-row min-h-screen bg-slate-50 dark:bg-[#070b12] text-slate-800 dark:text-slate-200 transition-colors duration-300">
    <!-- Navigation sidebar (Desktop sidebar + Mobile bottom nav) -->
    <app-sidebar class="no-print shrink-0" />

    <!-- Main Content Frame -->
    <div class="flex-1 flex flex-col min-h-screen relative">
      
      <!-- Top header bar (Desktop only) -->
      <header class="hidden md:flex justify-between items-center px-8 py-4 bg-white/40 dark:bg-[#0b1220]/40 border-b border-slate-200/40 dark:border-slate-800/40 backdrop-blur-md sticky top-0 z-20 no-print">
        <div class="flex items-center gap-3">
          <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></span>
          <span class="text-xs font-semibold text-slate-400">Servicio de Rifas 2026 Conectado</span>
        </div>

        <div class="flex items-center gap-4">
          <!-- Administrator display profile -->
          <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-lg bg-emerald-500/10 text-emerald-500 font-bold text-xs flex items-center justify-center border border-emerald-500/20">
              AD
            </div>
            <span class="text-xs font-bold text-slate-700 dark:text-slate-300">Hola, {{ raffleService.currentUser() }}</span>
          </div>
        </div>
      </header>

      <!-- Main Router Container -->
      <!-- Added padding-bottom to prevent mobile bottom navigation from blocking content elements -->
      <main class="flex-1 pb-[90px] md:pb-6 overflow-y-auto">
        <router-outlet />
      </main>
    </div>

    <!-- Global Toast notification pipeline -->
    <app-notifications />
  </div>
} @else {
  <!-- If admin is anonymous (renders Login view directly fullscreen) -->
  <main class="min-h-screen bg-slate-50 dark:bg-[#070b12] transition-colors duration-300">
    <router-outlet />
  </main>
}
