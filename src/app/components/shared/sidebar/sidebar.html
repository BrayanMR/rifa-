<!-- DESKTOP SIDEBAR -->
<aside 
  [class.w-64]="!isCollapsed()" 
  [class.w-20]="isCollapsed()" 
  class="hidden md:flex flex-col h-screen sticky top-0 left-0 bg-slate-50/70 dark:bg-[#0b1220]/75 border-r border-slate-200/50 dark:border-slate-800/50 backdrop-blur-md transition-all duration-300 z-30 shrink-0 text-slate-800 dark:text-slate-200"
>
  <!-- Header / Brand -->
  <div class="flex items-center p-5 border-b border-slate-200/40 dark:border-slate-800/40 overflow-hidden h-[73px]">
    <div class="flex items-center gap-3 shrink-0">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-emerald-400 to-teal-600 flex items-center justify-center text-white shadow-md shadow-emerald-500/10">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" />
        </svg>
      </div>
      <span [class.opacity-0]="isCollapsed()" [class.pointer-events-none]="isCollapsed()" class="font-bold tracking-tight text-lg transition-opacity duration-200 whitespace-nowrap">RifaPro</span>
    </div>
  </div>

  <!-- Navigation Links -->
  <nav class="flex-1 px-3 py-4 space-y-1.5 overflow-y-auto no-scrollbar">
    <!-- Links -->
    <a 
      routerLink="/dashboard" 
      routerLinkActive="bg-slate-200/60 dark:bg-slate-800/50 text-emerald-600 dark:text-emerald-400 border-l-2 border-emerald-500" 
      [routerLinkActiveOptions]="{exact: true}"
      class="flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-slate-200/40 dark:hover:bg-slate-800/30 text-slate-600 dark:text-slate-300 font-medium transition-all group"
      [title]="isCollapsed() ? 'Dashboard' : ''"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0 group-hover:scale-105 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z" />
      </svg>
      <span [class.hidden]="isCollapsed()" class="text-sm">Dashboard</span>
    </a>

    <a 
      routerLink="/raffles" 
      routerLinkActive="bg-slate-200/60 dark:bg-slate-800/50 text-emerald-600 dark:text-emerald-400 border-l-2 border-emerald-500" 
      class="flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-slate-200/40 dark:hover:bg-slate-800/30 text-slate-600 dark:text-slate-300 font-medium transition-all group"
      [title]="isCollapsed() ? 'Rifas' : ''"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0 group-hover:scale-105 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" />
      </svg>
      <span [class.hidden]="isCollapsed()" class="text-sm">Gestión de Rifas</span>
    </a>

    <a 
      routerLink="/admin/numbers" 
      routerLinkActive="bg-slate-200/60 dark:bg-slate-800/50 text-emerald-600 dark:text-emerald-400 border-l-2 border-emerald-500" 
      class="flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-slate-200/40 dark:hover:bg-slate-800/30 text-slate-600 dark:text-slate-300 font-medium transition-all group"
      [title]="isCollapsed() ? 'Selector' : ''"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0 group-hover:scale-105 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
      </svg>
      <span [class.hidden]="isCollapsed()" class="text-sm">Selector de Números</span>
    </a>

    <a 
      routerLink="/participants" 
      routerLinkActive="bg-slate-200/60 dark:bg-slate-800/50 text-emerald-600 dark:text-emerald-400 border-l-2 border-emerald-500" 
      class="flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-slate-200/40 dark:hover:bg-slate-800/30 text-slate-600 dark:text-slate-300 font-medium transition-all group"
      [title]="isCollapsed() ? 'Participantes' : ''"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0 group-hover:scale-105 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
      </svg>
      <span [class.hidden]="isCollapsed()" class="text-sm">Participantes</span>
    </a>

    <a 
      routerLink="/analytics" 
      routerLinkActive="bg-slate-200/60 dark:bg-slate-800/50 text-emerald-600 dark:text-emerald-400 border-l-2 border-emerald-500" 
      class="flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-slate-200/40 dark:hover:bg-slate-800/30 text-slate-600 dark:text-slate-300 font-medium transition-all group"
      [title]="isCollapsed() ? 'Estadísticas' : ''"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0 group-hover:scale-105 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" />
      </svg>
      <span [class.hidden]="isCollapsed()" class="text-sm">Estadísticas</span>
    </a>

    <a 
      routerLink="/history" 
      routerLinkActive="bg-slate-200/60 dark:bg-slate-800/50 text-emerald-600 dark:text-emerald-400 border-l-2 border-emerald-500" 
      class="flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-slate-200/40 dark:hover:bg-slate-800/30 text-slate-600 dark:text-slate-300 font-medium transition-all group"
      [title]="isCollapsed() ? 'Historial' : ''"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0 group-hover:scale-105 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <span [class.hidden]="isCollapsed()" class="text-sm">Historial</span>
    </a>
  </nav>

  <!-- Footer Actions -->
  <div class="p-3 border-t border-slate-200/40 dark:border-slate-800/40 space-y-1 shrink-0">
    
    <!-- Theme Toggle Link -->
    <button 
      (click)="toggleTheme()" 
      class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-200/40 dark:hover:bg-slate-800/30 text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-white transition-all text-left"
    >
      @if (isDarkMode()) {
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 9H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
        </svg>
        <span [class.hidden]="isCollapsed()" class="text-xs font-medium">Modo Claro</span>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
        <span [class.hidden]="isCollapsed()" class="text-xs font-medium">Modo Oscuro</span>
      }
    </button>

    <!-- Logout -->
    <button 
      (click)="onLogout()" 
      class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-rose-500 hover:bg-rose-500/10 transition-all text-left"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
      </svg>
      <span [class.hidden]="isCollapsed()" class="text-xs font-semibold">Cerrar Sesión</span>
    </button>

    <!-- Collapse Toggle -->
    <button 
      (click)="toggleCollapse()" 
      class="w-full hidden md:flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-200/40 dark:hover:bg-slate-800/30 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 transition-all text-left"
    >
      <svg 
        [class.rotate-180]="isCollapsed()" 
        xmlns="http://www.w3.org/2000/svg" 
        class="h-5 w-5 shrink-0 transition-transform duration-300" 
        fill="none" 
        viewBox="0 0 24 24" 
        stroke="currentColor" 
        stroke-width="1.8"
      >
        <path stroke-linecap="round" stroke-linejoin="round" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
      </svg>
      <span [class.hidden]="isCollapsed()" class="text-xs">Colapsar</span>
    </button>
  </div>
</aside>


<!-- MOBILE BOTTOM NAVIGATION -->
<nav class="md:hidden fixed bottom-0 left-0 right-0 bg-slate-50/80 dark:bg-[#070c16]/85 backdrop-blur-lg border-t border-slate-200/50 dark:border-slate-800/50 flex items-center justify-around px-2 py-2.5 z-40">
  <a 
    routerLink="/dashboard" 
    routerLinkActive="text-emerald-500 font-semibold" 
    [routerLinkActiveOptions]="{exact: true}"
    class="flex flex-col items-center justify-center flex-1 text-slate-400 dark:text-slate-500 transition-colors"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z" />
    </svg>
    <span class="text-[10px] mt-1">Dashboard</span>
  </a>

  <a 
    routerLink="/raffles" 
    routerLinkActive="text-emerald-500 font-semibold" 
    class="flex flex-col items-center justify-center flex-1 text-slate-400 dark:text-slate-500 transition-colors"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" />
    </svg>
    <span class="text-[10px] mt-1">Rifas</span>
  </a>

  <a 
    routerLink="/admin/numbers" 
    routerLinkActive="text-emerald-500 font-semibold" 
    class="flex flex-col items-center justify-center flex-1 text-slate-400 dark:text-slate-500 transition-colors"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
    </svg>
    <span class="text-[10px] mt-1">Números</span>
  </a>

  <a 
    routerLink="/participants" 
    routerLinkActive="text-emerald-500 font-semibold" 
    class="flex flex-col items-center justify-center flex-1 text-slate-400 dark:text-slate-500 transition-colors"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1z" />
    </svg>
    <span class="text-[10px] mt-1">Clientes</span>
  </a>

  <a 
    routerLink="/analytics" 
    routerLinkActive="text-emerald-500 font-semibold" 
    class="flex flex-col items-center justify-center flex-1 text-slate-400 dark:text-slate-500 transition-colors"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z" />
    </svg>
    <span class="text-[10px] mt-1">Métricas</span>
  </a>

  <!-- Mobile Hamburger bottom-sheet trigger -->
  <button 
    (click)="mobileSheet.classList.toggle('translate-y-0')" 
    class="flex flex-col items-center justify-center flex-1 text-slate-400 dark:text-slate-500 active:scale-95 transition-transform"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
    </svg>
    <span class="text-[10px] mt-1">Más</span>
  </button>
</nav>

<!-- MOBILE MENU BOTTOM SHEET PANEL (Slide-up modal) -->
<div 
  #mobileSheet 
  class="md:hidden fixed inset-x-0 bottom-0 max-h-[75vh] bg-slate-50/95 dark:bg-[#080d17]/95 border-t border-slate-200/50 dark:border-slate-800/50 rounded-t-[24px] backdrop-blur-xl translate-y-full transition-transform duration-300 ease-out z-50 p-6 flex flex-col gap-4 text-slate-800 dark:text-slate-100"
>
  <!-- Handle bar -->
  <div 
    (click)="mobileSheet.classList.add('translate-y-full')" 
    class="w-12 h-1.5 rounded-full bg-slate-300 dark:bg-slate-700 mx-auto mb-2 cursor-pointer"
  ></div>

  <div class="flex justify-between items-center mb-1">
    <div class="flex items-center gap-2.5">
      <div class="w-8 h-8 rounded-lg bg-emerald-500 flex items-center justify-center text-white text-sm font-bold">R</div>
      <span class="font-bold">Opciones del Administrador</span>
    </div>
    <button 
      (click)="mobileSheet.classList.add('translate-y-full')" 
      class="p-1 rounded-full bg-slate-200/60 dark:bg-slate-800/60 text-slate-500"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
      </svg>
    </button>
  </div>

  <div class="grid grid-cols-2 gap-3.5 mt-2">
    <a 
      routerLink="/history" 
      (click)="mobileSheet.classList.add('translate-y-full')"
      class="flex items-center gap-3 p-4 rounded-2xl bg-white/50 dark:bg-white/5 border border-slate-200/50 dark:border-slate-800/50 font-medium hover:bg-white dark:hover:bg-white/10"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <span class="text-xs">Historial Log</span>
    </a>

    <button 
      (click)="toggleTheme()" 
      class="flex items-center gap-3 p-4 rounded-2xl bg-white/50 dark:bg-white/5 border border-slate-200/50 dark:border-slate-800/50 font-medium text-left hover:bg-white dark:hover:bg-white/10"
    >
      @if (isDarkMode()) {
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 9H3m15.364-6.364l-.707.707" />
        </svg>
        <span class="text-xs">Modo Claro</span>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
        <span class="text-xs">Modo Oscuro</span>
      }
    </button>
  </div>

  <div class="mt-4 pt-4 border-t border-slate-200/50 dark:border-slate-800/50">
    <div class="flex justify-between items-center mb-4">
      <div class="flex flex-col">
        <span class="text-xs text-slate-400">Usuario Activo</span>
        <span class="text-sm font-semibold">{{ raffleService.currentUser() }}</span>
      </div>
      <button 
        (click)="onLogout(); mobileSheet.classList.add('translate-y-full')" 
        class="flex items-center gap-2 px-4 py-2.5 rounded-xl bg-rose-500/10 hover:bg-rose-500 text-rose-500 hover:text-white transition-all text-xs font-semibold"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7" />
        </svg>
        Cerrar Sesión
      </button>
    </div>
  </div>
</div>
